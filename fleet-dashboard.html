<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Dashboard — Joalku</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f9f8f6; color: #1a1a1a; min-height: 100vh;
  }

  .page { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }

  .page-header { margin-bottom: 24px; }
  .page-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .page-sub { font-size: 16px; color: #999; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat-card { background: #fff; border: 1px solid #ece9e3; border-radius: 10px; padding: 14px 16px; }
  .stat-num { font-size: 24px; font-weight: 500; }
  .stat-lbl { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #bbb; margin-top: 3px; }
  .stat-card.warn .stat-num { color: #f28324; }
  .stat-card.danger .stat-num { color: #b71c1c; }

  /* Toolbar */
  .toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; pointer-events: none; }

  input[type="text"], input[type="number"], input[type="date"] {
    width: 100%; padding: 9px 12px; border: 1px solid #e0ddd8;
    border-radius: 8px; font-size: 18px; color: #1a1a1a;
    background: #fff; outline: none; transition: border-color 0.15s; font-family: inherit;
  }
  input:focus { border-color: #f28324; }
  input::placeholder { color: #bbb; }
  #searchInput { padding-left: 36px; }

  select {
    padding: 9px 12px; border: 1px solid #e0ddd8; border-radius: 8px;
    font-size: 16px; color: #1a1a1a; background: #fff; outline: none;
    cursor: pointer; appearance: none; font-family: inherit; transition: border-color 0.15s;
  }
  select:focus { border-color: #f28324; }

  textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #e0ddd8; border-radius: 8px;
    font-size: 18px; color: #1a1a1a; background: #fff; outline: none;
    resize: vertical; min-height: 72px; font-family: inherit; transition: border-color 0.15s;
  }
  textarea:focus { border-color: #f28324; }

  /* View toggle */
  .view-toggle { display: flex; border: 1px solid #e0ddd8; border-radius: 8px; overflow: hidden; }
  .view-btn { padding: 8px 12px; background: #fff; border: none; cursor: pointer; color: #999; font-size: 16px; transition: background 0.15s, color 0.15s; border-right: 1px solid #e0ddd8; }
  .view-btn:last-child { border-right: none; }
  .view-btn.active { background: #f28324; color: #fff; }

  .results-header { font-size: 14px; color: #bbb; margin-bottom: 10px; }

  /* Vehicle row */
  .veh-row {
    background: #fff; border: 1px solid #ece9e3; border-radius: 8px;
    padding: 14px 18px; cursor: pointer; transition: border-color 0.15s;
    display: flex; align-items: center; gap: 14px; margin-bottom: 2px;
  }
  .veh-row:hover { border-color: #d4c9b8; }
  .veh-row.open { border-color: #f28324; box-shadow: 0 0 0 1px #f28324; border-radius: 8px 8px 0 0; margin-bottom: 0; }

  .veh-info { flex: 1; min-width: 0; }
  .veh-name { font-size: 18px; font-weight: 500; margin-bottom: 3px; }
  .veh-meta { font-size: 14px; color: #999; display: flex; gap: 10px; flex-wrap: wrap; }

  .status-pill { font-size: 14px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .status-pill.active { background: #e8f5e9; color: #1b5e20; }
  .status-pill.repair { background: #fff3e0; color: #c65a00; }
  .status-pill.outofservice { background: #fce4ec; color: #880e4f; }

  /* Grid view */
  .veh-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .veh-card { background: #fff; border: 1px solid #ece9e3; border-radius: 10px; padding: 16px; cursor: pointer; transition: border-color 0.15s; }
  .veh-card:hover { border-color: #d4c9b8; }
  .veh-card.open { border-color: #f28324; box-shadow: 0 0 0 1px #f28324; }
  .card-name { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .card-reg { font-size: 14px; color: #999; margin-bottom: 10px; }

  /* Compact table */
  .veh-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #ece9e3; }
  .veh-table th { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: #bbb; padding: 10px 14px; border-bottom: 1px solid #ece9e3; text-align: left; background: #fafaf8; }
  .veh-table td { font-size: 16px; padding: 10px 14px; border-bottom: 1px solid #f3f2ef; cursor: pointer; }
  .veh-table tr:last-child td { border-bottom: none; }
  .veh-table tr:hover td { background: #fafaf8; }
  .veh-table tr.open td { background: #fff8f2; }

  /* Detail panel */
  .detail-panel { background: #fafaf8; border: 1px solid #f28324; border-top: none; box-shadow: 0 0 0 1px #f28324; border-radius: 0 0 8px 8px; margin-bottom: 10px; display: none; }
  .detail-panel.visible { display: block; }

  .panel-tabs { display: flex; border-bottom: 1px solid #ece9e3; background: #fff; }
  .panel-tab { padding: 12px 18px; font-size: 16px; font-weight: 500; color: #999; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; font-family: inherit; }
  .panel-tab.active { color: #f28324; border-bottom-color: #f28324; }

  .panel-content { padding: 20px; display: none; }
  .panel-content.active { display: block; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .form-group label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #bbb; margin-bottom: 5px; }
  .form-group.full { grid-column: span 2; }

  /* Repair list */
  .repair-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .repair-item { background: #fff; border: 1px solid #ece9e3; border-radius: 8px; padding: 12px 16px; }
  .repair-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
  .repair-summary { font-size: 16px; font-weight: 500; flex: 1; }
  .repair-meta { font-size: 14px; color: #999; display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  .repair-cost { font-size: 14px; font-weight: 600; color: #1a1a1a; white-space: nowrap; }

  .repair-status { font-size: 14px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .repair-status.ok { background: #e8f5e9; color: #1b5e20; }
  .repair-status.inprogress { background: #fff3e0; color: #c65a00; }
  .repair-status.completed { background: #e3f2fd; color: #0d47a1; }
  .repair-status.pending { background: #fce4ec; color: #880e4f; }

  /* Log repair form */
  .log-repair-section { border-top: 1px solid #ece9e3; padding-top: 16px; margin-top: 4px; }
  .log-repair-section h4 { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 14px; }
  .no-access { background: #f9f8f6; border: 1px solid #ece9e3; border-radius: 8px; padding: 14px 16px; font-size: 16px; color: #999; text-align: center; }

  /* Actions */
  .action-row { display: flex; gap: 10px; padding-top: 16px; border-top: 1px solid #ece9e3; }
  .btn-save { background: #f28324; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; }
  .btn-save:hover { background: #d4711e; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost-sm { background: none; color: #999; border: 1px solid #e0ddd8; border-radius: 8px; padding: 10px 16px; font-size: 16px; cursor: pointer; font-family: inherit; }
  .btn-ghost-sm:hover { background: #f3f3f1; }

  /* States */
  .state-msg { text-align: center; padding: 40px 0; color: #bbb; font-size: 18px; }
  .state-msg strong { display: block; color: #888; margin-bottom: 4px; font-size: 15px; }
  .loading { display: flex; gap: 5px; justify-content: center; padding: 48px 0; }
  .loading span { width: 7px; height: 7px; border-radius: 50%; background: #f28324; opacity: 0.4; animation: pulse 1.2s infinite; }
  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: 500; transition: transform 0.25s ease; z-index: 100; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { background: #1b5e20; }
  .toast.err { background: #b71c1c; }

  @media (max-width: 560px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: span 1; }
    .veh-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <p class="page-title">Fleet Dashboard</p>
    <p class="page-sub" id="pageSub">Loading…</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="s-total">—</div><div class="stat-lbl">Total vehicles</div></div>
    <div class="stat-card"><div class="stat-num" id="s-active">—</div><div class="stat-lbl">Active</div></div>
    <div class="stat-card warn"><div class="stat-num" id="s-repair">—</div><div class="stat-lbl">In repair</div></div>
    <div class="stat-card danger"><div class="stat-num" id="s-oos">—</div><div class="stat-lbl">Out of service</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search by name, registration, type…" oninput="onSearch()" />
    </div>
    <select id="typeFilter" onchange="onSearch()">
      <option value="">All types</option>
      <option>Mixer Truck</option>
      <option>Tipper Truck</option>
      <option>Pump Truck</option>
      <option>Wheel Loader</option>
      <option>Generator</option>
      <option>KIA / Pickup</option>
      <option>Aboboya</option>
      <option>Other</option>
    </select>
    <select id="statusFilter" onchange="onSearch()">
      <option value="">All statuses</option>
      <option>Active</option>
      <option>In Repair</option>
      <option>Out of Service</option>
    </select>
    <select id="locationFilter" onchange="onSearch()">
      <option value="">All locations</option>
      <option>Teshie</option>
      <option>Tema</option>
      <option>Both</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="vlist" onclick="setView('list')" title="List">☰</button>
      <button class="view-btn" id="vgrid" onclick="setView('grid')" title="Grid">⊞</button>
      <button class="view-btn" id="vcompact" onclick="setView('compact')" title="Compact">≡</button>
    </div>
  </div>

  <div id="resultsMeta" class="results-header"></div>
  <div id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const WORKER      = 'https://joalku-production-editer.dholmes127.workers.dev';
  const FLEET_DB    = '46c92733827e83a8b3a501b1cce08146';
  const MAINT_DB    = 'be992733827e83d28b8801e1504c3bcd';

  // WordPress usernames allowed to log repairs
  const REPAIR_USERS = ['pius', 'pius.joalku', 'muaz']; // add more as needed

  // WordPress usernames allowed to see total repair cost and individual repair costs
  const FINANCE_USERS = ['kmadziwa', 'alice_madziwa', 'pius', 'pius.joalku']; // Kundai, Alice Madziwa, Pius

  // Check WordPress current user — passed via ?login=... in the iframe URL
  // since this page is iframed from a different domain (GitHub Pages) and
  // can't read window.scbCurrentUser directly (cross-origin).
  const urlParams = new URLSearchParams(window.location.search);
  const loginFromUrl = urlParams.get('login');
  const wpUser = loginFromUrl
    ? loginFromUrl.toLowerCase()
    : (typeof window.scbCurrentUser !== 'undefined' && window.scbCurrentUser?.login)
      ? window.scbCurrentUser.login.toLowerCase()
      : null;
  const canLogRepair = wpUser && REPAIR_USERS.includes(wpUser);
  const canViewCosts = wpUser && FINANCE_USERS.includes(wpUser);

  let allVehicles = [];
  let allRepairs  = [];
  let openId      = null;
  let activeTab   = {};
  let currentView = 'list';
  let searchTimer = null;

  window.onload = load;

  async function load() {
    document.getElementById('list').innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
    try {
      const [fleetData, maintData] = await Promise.all([
        queryDB(FLEET_DB, null, [{property:'Equipment Name', direction:'ascending'}]),
        queryDB(MAINT_DB, null, [{property:'Date', direction:'descending'}])
      ]);
      allVehicles = fleetData.results;
      allRepairs  = maintData.results;
      updateStats();
      document.getElementById('pageSub').textContent = `${allVehicles.length} vehicles · ${allRepairs.length} repair records`;
      applyFiltersAndRender();
    } catch(e) {
      document.getElementById('pageSub').textContent = '';
      document.getElementById('list').innerHTML = `<div class="state-msg"><strong>Could not connect</strong>${e.message}</div>`;
    }
  }

  async function queryDB(dbId, filter, sorts) {
    const body = { page_size: 100 };
    if (filter) body.filter = filter;
    if (sorts) body.sorts = sorts;
    const r = await fetch(`${WORKER}/v1/databases/${dbId}/query`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message||'API error'); }
    return r.json();
  }

  function getProp(page, name, type='rich_text') {
    const p = page.properties[name];
    if (!p) return '—';
    if (type==='title')     return p.title?.[0]?.plain_text||'—';
    if (type==='rich_text') return p.rich_text?.[0]?.plain_text||'—';
    if (type==='select')    return p.select?.name||'—';
    if (type==='date')      return p.date?.start||'—';
    if (type==='number')    return p.number??null;
    if (type==='rollup_num') return p.rollup?.number??null;
    return '—';
  }

  function getRepairsFor(vehicleId) {
    return allRepairs.filter(r => {
      const rel = r.properties['Fleet Entry']?.relation || [];
      return rel.some(x => x.id === vehicleId);
    });
  }

  function updateStats() {
    const active = allVehicles.filter(v => getProp(v,'Status','select')==='Active').length;
    const repair = allVehicles.filter(v => getProp(v,'Status','select')==='In Repair').length;
    const oos    = allVehicles.filter(v => getProp(v,'Status','select')==='Out of Service').length;
    document.getElementById('s-total').textContent = allVehicles.length;
    document.getElementById('s-active').textContent = active;
    document.getElementById('s-repair').textContent = repair;
    document.getElementById('s-oos').textContent = oos;
  }

  function fmtDate(d) {
    if (!d||d==='—') return '—';
    return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  }

  function statusClass(s) {
    if (s==='Active') return 'active';
    if (s==='In Repair') return 'repair';
    if (s==='Out of Service') return 'outofservice';
    return '';
  }

  function repairStatusClass(s) {
    if (s==='OK') return 'ok';
    if (s==='In Progress') return 'inprogress';
    if (s==='Completed') return 'completed';
    if (s==='Pending') return 'pending';
    return '';
  }

  function fmtCost(n) { return n != null ? `₵${n.toLocaleString()}` : '—'; }

  function getFilteredVehicles() {
    const q      = document.getElementById('searchInput').value.trim().toLowerCase();
    const type   = document.getElementById('typeFilter').value;
    const status = document.getElementById('statusFilter').value;
    const loc    = document.getElementById('locationFilter').value;
    let filtered = allVehicles;
    if (type)   filtered = filtered.filter(v => getProp(v,'Type','select')===type);
    if (status) filtered = filtered.filter(v => getProp(v,'Status','select')===status);
    if (loc)    filtered = filtered.filter(v => getProp(v,'Location','select')===loc);
    if (q)      filtered = filtered.filter(v =>
      getProp(v,'Equipment Name','title').toLowerCase().includes(q) ||
      getProp(v,'Registration / ID','rich_text').toLowerCase().includes(q) ||
      getProp(v,'Type','select').toLowerCase().includes(q)
    );
    return filtered;
  }

  function applyFiltersAndRender() {
    const filtered = getFilteredVehicles();
    document.getElementById('resultsMeta').textContent = `${filtered.length} vehicle${filtered.length!==1?'s':''}`;
    if (currentView==='list') renderList(filtered);
    else if (currentView==='grid') renderGrid(filtered);
    else renderCompact(filtered);
  }

  function onSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(applyFiltersAndRender, 200); }
  function setView(v) {
    currentView = v; openId = null;
    ['list','grid','compact'].forEach(x => document.getElementById('v'+x).classList.toggle('active', x===v));
    applyFiltersAndRender();
  }

  // ── LIST VIEW ──────────────────────────────────────────────────────────────
  function renderList(vehicles) {
    const list = document.getElementById('list');
    if (!vehicles.length) { list.innerHTML = '<div class="state-msg"><strong>No vehicles found</strong></div>'; return; }
    list.innerHTML = '';
    vehicles.forEach(v => {
      const id     = v.id;
      const name   = getProp(v,'Equipment Name','title');
      const reg    = getProp(v,'Registration / ID','rich_text');
      const type   = getProp(v,'Type','select');
      const status = getProp(v,'Status','select');
      const loc    = getProp(v,'Location','select');
      const repairs= getRepairsFor(id);

      const row = document.createElement('div');
      row.className = 'veh-row' + (openId===id?' open':'');
      row.dataset.id = id;
      row.innerHTML = `
        <div class="veh-info">
          <div class="veh-name">${name}</div>
          <div class="veh-meta">
            ${reg!=='—'?`<span>${reg}</span>`:''}
            ${type!=='—'?`<span>${type}</span>`:''}
            ${loc!=='—'?`<span>${loc}</span>`:''}
            <span>${repairs.length} repair${repairs.length!==1?'s':''}</span>
          </div>
        </div>
        <div class="status-pill ${statusClass(status)}">${status}</div>
      `;
      row.onclick = () => toggleDetail(id, v);
      list.appendChild(row);
      list.appendChild(buildDetailPanel(id, v));
    });
  }

  // ── GRID VIEW ──────────────────────────────────────────────────────────────
  function renderGrid(vehicles) {
    const list = document.getElementById('list');
    if (!vehicles.length) { list.innerHTML = '<div class="state-msg"><strong>No vehicles found</strong></div>'; return; }
    list.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'veh-grid';
    vehicles.forEach(v => {
      const id     = v.id;
      const name   = getProp(v,'Equipment Name','title');
      const reg    = getProp(v,'Registration / ID','rich_text');
      const status = getProp(v,'Status','select');
      const card = document.createElement('div');
      card.className = 'veh-card' + (openId===id?' open':'');
      card.dataset.id = id;
      card.innerHTML = `
        <div class="card-name">${name}</div>
        <div class="card-reg">${reg!=='—'?reg:''}</div>
        <div class="status-pill ${statusClass(status)}">${status}</div>
      `;
      card.onclick = () => toggleDetailGrid(id, v, grid);
      grid.appendChild(card);
    });
    list.appendChild(grid);
    if (openId) {
      const panel = buildDetailPanel(openId, vehicles.find(v=>v.id===openId));
      if (panel) { panel.style.borderRadius='8px'; panel.style.borderTop='1px solid #f28324'; panel.classList.add('visible'); list.appendChild(panel); }
    }
  }

  function toggleDetailGrid(id, v, grid) {
    const list = document.getElementById('list');
    list.querySelectorAll('.detail-panel').forEach(p=>p.remove());
    grid.querySelectorAll('.veh-card').forEach(c=>c.classList.remove('open'));
    if (openId===id) { openId=null; return; }
    openId=id;
    grid.querySelectorAll('.veh-card').forEach(c=>{ if(c.dataset.id===id) c.classList.add('open'); });
    const panel = buildDetailPanel(id, v);
    panel.style.borderRadius='8px'; panel.style.borderTop='1px solid #f28324'; panel.classList.add('visible');
    list.appendChild(panel);
    panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  // ── COMPACT VIEW ────────────────────────────────────────────────────────────
  function renderCompact(vehicles) {
    const list = document.getElementById('list');
    if (!vehicles.length) { list.innerHTML = '<div class="state-msg"><strong>No vehicles found</strong></div>'; return; }
    list.innerHTML = '';
    const table = document.createElement('table');
    table.className = 'veh-table';
    table.innerHTML = `<thead><tr><th>Name</th><th>Registration</th><th>Type</th><th>Location</th><th>Status</th><th>Repairs</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');
    vehicles.forEach(v => {
      const id = v.id;
      const tr = document.createElement('tr');
      tr.className = openId===id?'open':'';
      tr.dataset.id = id;
      tr.innerHTML = `
        <td><strong>${getProp(v,'Equipment Name','title')}</strong></td>
        <td>${getProp(v,'Registration / ID','rich_text')}</td>
        <td>${getProp(v,'Type','select')}</td>
        <td>${getProp(v,'Location','select')}</td>
        <td>${getProp(v,'Status','select')}</td>
        <td>${getRepairsFor(id).length}</td>
      `;
      tr.onclick = () => { openId = openId===id?null:id; renderCompact(getFilteredVehicles()); };
      tbody.appendChild(tr);
      if (openId===id) {
        const panelRow = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan=6; td.style.padding='0';
        const panel = buildDetailPanel(id, v);
        panel.style.cssText='border-radius:0;border:none;box-shadow:none;border-top:1px solid #f28324;';
        panel.classList.add('visible');
        td.appendChild(panel); panelRow.appendChild(td); tbody.appendChild(panelRow);
      }
    });
    list.appendChild(table);
  }

  // ── DETAIL PANEL ───────────────────────────────────────────────────────────
  function buildDetailPanel(id, v) {
    const name   = getProp(v,'Equipment Name','title');
    const reg    = getProp(v,'Registration / ID','rich_text');
    const type   = getProp(v,'Type','select');
    const status = getProp(v,'Status','select');
    const loc    = getProp(v,'Location','select');
    const notes  = getProp(v,'Notes','rich_text');
    const repairs= getRepairsFor(id);
    const tab    = activeTab[id] || 'overview';

    const totalCost = repairs.reduce((sum,r) => sum + (getProp(r,'Cost (GHS)','number')||0), 0);

    const repairsHtml = repairs.length ? repairs.map(r => {
      const rs  = getProp(r,'Repair Summary','title');
      const rd  = getProp(r,'Date','date');
      const rw  = getProp(r,'What Was Repaired','rich_text');
      const rp  = getProp(r,'Parts Used','rich_text');
      const rc  = getProp(r,'Cost (GHS)','number');
      const rst = getProp(r,'Status','select');
      const rb  = getProp(r,'Reported By','select');
      return `<div class="repair-item">
        <div class="repair-top">
          <div class="repair-summary">${rs}</div>
          <div class="repair-status ${repairStatusClass(rst)}">${rst}</div>
        </div>
        <div class="repair-meta">
          <span>📅 ${fmtDate(rd)}</span>
          ${rw!=='—'?`<span>🔧 ${rw}</span>`:''}
          ${rp!=='—'?`<span>🔩 ${rp}</span>`:''}
          ${rb!=='—'?`<span>👤 ${rb}</span>`:''}
        </div>
        ${(canViewCosts && rc!=null)?`<div class="repair-cost" style="margin-top:6px">${fmtCost(rc)}</div>`:''}
      </div>`;
    }).join('') : '<div class="state-msg" style="padding:20px 0"><strong>No repairs logged</strong></div>';

    const logRepairHtml = canLogRepair ? `
      <div class="log-repair-section">
        <h4>Log a repair</h4>
        <div class="form-grid">
          <div class="form-group full">
            <label>Repair Summary</label>
            <input type="text" id="nr-summary-${id}" placeholder="e.g. Helper wheel repairs" />
          </div>
          <div class="form-group full">
            <label>What Was Repaired</label>
            <textarea id="nr-what-${id}" placeholder="Describe what was repaired…"></textarea>
          </div>
          <div class="form-group">
            <label>Parts Used</label>
            <input type="text" id="nr-parts-${id}" placeholder="e.g. Hub seal, bearings" />
          </div>
          <div class="form-group">
            <label>Supplier</label>
            <input type="text" id="nr-supplier-${id}" placeholder="Supplier name" />
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="nr-date-${id}" value="${new Date().toISOString().slice(0,10)}" />
          </div>
          <div class="form-group">
            <label>Cost (GHS)</label>
            <input type="number" id="nr-cost-${id}" placeholder="0.00" />
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="nr-status-${id}">
              <option>Pending</option>
              <option>In Progress</option>
              <option>Completed</option>
              <option>OK</option>
            </select>
          </div>
          <div class="form-group">
            <label>Month</label>
            <select id="nr-month-${id}">
              ${['Oct 2025','Nov 2025','Dec 2025','Jan 2026','Feb 2026','Mar 2026','Apr 2026','May 2026','Jun 2026'].map(m=>`<option ${m===getCurrentMonth()?'selected':''}>${m}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="action-row">
          <button class="btn-save" id="btn-repair-${id}" onclick="logRepair('${id}','${name}',event)">Log repair</button>
          <button class="btn-ghost-sm" onclick="closeDetail(event)">Cancel</button>
        </div>
      </div>
    ` : `<div class="no-access">You don't have permission to log repairs.</div>`;

    const detail = document.createElement('div');
    detail.className = 'detail-panel';
    detail.id = 'detail-'+id;
    detail.innerHTML = `
      <div class="panel-tabs">
        <button class="panel-tab ${tab==='overview'?'active':''}" onclick="switchTab('${id}','overview',event)">Overview</button>
        <button class="panel-tab ${tab==='repairs'?'active':''}" onclick="switchTab('${id}','repairs',event)">Repairs (${repairs.length})</button>
        ${canLogRepair ? `<button class="panel-tab ${tab==='log'?'active':''}" onclick="switchTab('${id}','log',event)">Log Repair</button>` : ''}
      </div>

      <div class="panel-content ${tab==='overview'?'active':''}" id="tab-overview-${id}">
        <div class="form-grid">
          <div class="form-group">
            <label>Equipment Name</label>
            <input type="text" id="f-name-${id}" value="${name!=='—'?name:''}" />
          </div>
          <div class="form-group">
            <label>Registration / ID</label>
            <input type="text" id="f-reg-${id}" value="${reg!=='—'?reg:''}" />
          </div>
          <div class="form-group">
            <label>Type</label>
            <select id="f-type-${id}">
              <option value="">— select —</option>
              ${['Mixer Truck','Tipper Truck','Pump Truck','Wheel Loader','Generator','KIA / Pickup','Aboboya','Other'].map(t=>`<option ${type===t?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="f-status-${id}">
              <option value="">— select —</option>
              ${['Active','In Repair','Out of Service'].map(s=>`<option ${status===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Location</label>
            <select id="f-loc-${id}">
              <option value="">— select —</option>
              ${['Teshie','Tema','Both'].map(l=>`<option ${loc===l?'selected':''}>${l}</option>`).join('')}
            </select>
          </div>
          ${canViewCosts ? `<div class="form-group">
            <label>Total repair cost</label>
            <input type="text" value="${fmtCost(totalCost)}" disabled style="background:#f9f8f6;color:#999" />
          </div>` : ''}
          <div class="form-group full">
            <label>Notes</label>
            <textarea id="f-notes-${id}">${notes!=='—'?notes:''}</textarea>
          </div>
        </div>
        <div class="action-row">
          <button class="btn-save" id="btn-overview-${id}" onclick="saveOverview('${id}',event)">Save changes</button>
          <button class="btn-ghost-sm" onclick="closeDetail(event)">Cancel</button>
        </div>
      </div>

      <div class="panel-content ${tab==='repairs'?'active':''}" id="tab-repairs-${id}">
        <div class="repair-list">${repairsHtml}</div>
        ${canLogRepair ? `<button class="btn-save" style="margin-top:4px" onclick="switchTab('${id}','log',this.closest('.detail-panel').querySelector('.panel-tab:last-child') || {classList:{add:()=>{},remove:()=>{}}},event)">+ Log new repair</button>` : ''}
      </div>

      <div class="panel-content ${tab==='log'?'active':''}" id="tab-log-${id}">
        ${logRepairHtml}
      </div>
    `;
    return detail;
  }

  function getCurrentMonth() {
    const now = new Date();
    return now.toLocaleDateString('en-GB',{month:'short',year:'numeric'}).replace(' ','/').replace('/',' ');
  }

  function toggleDetail(id, v) {
    const list = document.getElementById('list');
    if (openId===id) { openId=null; document.querySelectorAll('.veh-row').forEach(r=>r.classList.remove('open')); document.querySelectorAll('.detail-panel').forEach(d=>d.remove()); return; }
    document.querySelectorAll('.veh-row').forEach(r=>r.classList.remove('open'));
    document.querySelectorAll('.detail-panel').forEach(d=>d.remove());
    openId=id;
    const row = list.querySelector(`.veh-row[data-id="${id}"]`);
    if (row) row.classList.add('open');
    const panel = buildDetailPanel(id, v);
    panel.classList.add('visible');
    row.insertAdjacentElement('afterend', panel);
    panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  function closeDetail(e) {
    e.stopPropagation(); openId=null;
    document.querySelectorAll('.veh-row,.veh-card').forEach(r=>r.classList.remove('open'));
    document.querySelectorAll('.detail-panel').forEach(d=>d.remove());
  }

  function switchTab(id, tab, e) {
    if (e && e.stopPropagation) e.stopPropagation();
    activeTab[id] = tab;
    const panel = document.getElementById('detail-'+id);
    if (!panel) return;
    panel.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));
    panel.querySelectorAll('.panel-content').forEach(c=>c.classList.remove('active'));
    const btn = panel.querySelector(`.panel-tab:nth-child(${tab==='overview'?1:tab==='repairs'?2:3})`);
    if (btn) btn.classList.add('active');
    const content = document.getElementById(`tab-${tab}-${id}`);
    if (content) content.classList.add('active');
  }

  async function saveOverview(id, e) {
    e.stopPropagation();
    const btn = document.getElementById('btn-overview-'+id);
    btn.disabled=true; btn.textContent='Saving…';
    const name   = document.getElementById('f-name-'+id).value.trim();
    const reg    = document.getElementById('f-reg-'+id).value.trim();
    const type   = document.getElementById('f-type-'+id).value;
    const status = document.getElementById('f-status-'+id).value;
    const loc    = document.getElementById('f-loc-'+id).value;
    const notes  = document.getElementById('f-notes-'+id).value.trim();
    const props = {
      'Equipment Name': { title: [{ type:'text', text:{ content:name } }] },
      'Registration / ID': { rich_text: [{ type:'text', text:{ content:reg } }] },
      'Notes': { rich_text: [{ type:'text', text:{ content:notes } }] },
    };
    if (type)   props['Type']     = { select:{ name:type } };
    if (status) props['Status']   = { select:{ name:status } };
    if (loc)    props['Location'] = { select:{ name:loc } };
    try {
      const r = await fetch(`${WORKER}/v1/pages/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({properties:props}) });
      if (!r.ok) throw new Error();
      toast('Vehicle updated','ok');
      btn.textContent='Saved ✓';
      setTimeout(()=>{ btn.disabled=false; btn.textContent='Save changes'; },2000);
      openId=null; load();
    } catch { toast('Failed to save','err'); btn.disabled=false; btn.textContent='Save changes'; }
  }

  async function logRepair(vehicleId, vehicleName, e) {
    e.stopPropagation();
    if (!canLogRepair) { toast('Not authorised','err'); return; }
    const btn = document.getElementById('btn-repair-'+vehicleId);
    const summary  = document.getElementById('nr-summary-'+vehicleId).value.trim();
    if (!summary) { toast('Enter a repair summary','err'); return; }
    const what     = document.getElementById('nr-what-'+vehicleId).value.trim();
    const parts    = document.getElementById('nr-parts-'+vehicleId).value.trim();
    const supplier = document.getElementById('nr-supplier-'+vehicleId).value.trim();
    const date     = document.getElementById('nr-date-'+vehicleId).value;
    const cost     = parseFloat(document.getElementById('nr-cost-'+vehicleId).value)||null;
    const status   = document.getElementById('nr-status-'+vehicleId).value;
    const month    = document.getElementById('nr-month-'+vehicleId).value;

    btn.disabled=true; btn.textContent='Logging…';

    const props = {
      'Repair Summary': { title: [{ type:'text', text:{ content:summary } }] },
      'Equipment': { rich_text: [{ type:'text', text:{ content:vehicleName } }] },
      'What Was Repaired': { rich_text: [{ type:'text', text:{ content:what } }] },
      'Parts Used': { rich_text: [{ type:'text', text:{ content:parts } }] },
      'Supplier': { rich_text: [{ type:'text', text:{ content:supplier } }] },
      'Fleet Entry': { relation: [{ id: vehicleId }] },
    };
    if (date)   props['Date']   = { date:{ start:date } };
    if (cost)   props['Cost (GHS)'] = { number:cost };
    if (status) props['Status'] = { select:{ name:status } };
    if (month)  props['Month']  = { select:{ name:month } };

    // Set Reported By to Pius
    props['Reported By'] = { select:{ name:'Pius' } };

    try {
      const r = await fetch(`${WORKER}/v1/pages`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ parent:{ database_id: MAINT_DB }, properties:props })
      });
      if (!r.ok) throw new Error();
      toast('Repair logged','ok');
      btn.textContent='Logged ✓';
      setTimeout(()=>{ btn.disabled=false; btn.textContent='Log repair'; },2000);
      openId=null; load();
    } catch { toast('Failed to log','err'); btn.disabled=false; btn.textContent='Log repair'; }
  }

  function toast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent=msg; t.className='toast show '+type;
    setTimeout(()=>t.className='toast',3000);
  }
</script>
</body>
</html>
