<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Dashboard — Joalku</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f9f8f6; color: #1a1a1a; min-height: 100vh;
  }

  .page { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }

  .page-header { margin-bottom: 24px; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .page-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: #999; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat-card { background: #fff; border: 1px solid #ece9e3; border-radius: 10px; padding: 14px 16px; }
  .stat-num { font-size: 24px; font-weight: 500; }
  .stat-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #bbb; margin-top: 3px; }

  /* Toolbar */
  .toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; pointer-events: none; }

  input[type="text"], input[type="number"], input[type="date"], input[type="email"], input[type="tel"] {
    width: 100%; padding: 9px 12px; border: 1px solid #e0ddd8;
    border-radius: 8px; font-size: 14px; color: #1a1a1a;
    background: #fff; outline: none; transition: border-color 0.15s;
    font-family: inherit;
  }
  input:focus { border-color: #f28324; }
  input::placeholder { color: #bbb; }
  #searchInput { padding-left: 36px; }

  select {
    padding: 9px 12px; border: 1px solid #e0ddd8; border-radius: 8px;
    font-size: 13px; color: #1a1a1a; background: #fff; outline: none;
    cursor: pointer; appearance: none; font-family: inherit;
    transition: border-color 0.15s;
  }
  select:focus { border-color: #f28324; }

  textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #e0ddd8;
    border-radius: 8px; font-size: 14px; color: #1a1a1a;
    background: #fff; outline: none; resize: vertical; min-height: 80px;
    font-family: inherit; transition: border-color 0.15s;
  }
  textarea:focus { border-color: #f28324; }

  /* View toggle */
  .view-toggle { display: flex; border: 1px solid #e0ddd8; border-radius: 8px; overflow: hidden; }
  .view-btn {
    padding: 8px 12px; background: #fff; border: none; cursor: pointer;
    color: #999; font-size: 13px; transition: background 0.15s, color 0.15s;
    border-right: 1px solid #e0ddd8;
  }
  .view-btn:last-child { border-right: none; }
  .view-btn.active { background: #f28324; color: #fff; }

  .former-toggle {
    font-size: 13px; color: #999; cursor: pointer; display: flex;
    align-items: center; gap: 6px; white-space: nowrap; background: none;
    border: 1px solid #e0ddd8; border-radius: 8px; padding: 8px 12px;
    transition: border-color 0.15s, color 0.15s;
  }
  .former-toggle.active { border-color: #f28324; color: #f28324; }

  .results-header { font-size: 12px; color: #bbb; margin-bottom: 10px; }

  /* LIST VIEW */
  .emp-row {
    background: #fff; border: 1px solid #ece9e3; border-radius: 8px;
    padding: 14px 18px; cursor: pointer; transition: border-color 0.15s;
    display: flex; align-items: center; gap: 14px; margin-bottom: 2px;
  }
  .emp-row:hover { border-color: #d4c9b8; }
  .emp-row.open { border-color: #f28324; box-shadow: 0 0 0 1px #f28324; border-radius: 8px 8px 0 0; margin-bottom: 0; }

  .emp-info { flex: 1; min-width: 0; }
  .emp-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .emp-meta { font-size: 12px; color: #999; display: flex; gap: 10px; flex-wrap: wrap; }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
  .status-dot.current { background: #22a06b; }
  .status-dot.former { background: #e53e3e; }

  /* GRID VIEW */
  .emp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .emp-card {
    background: #fff; border: 1px solid #ece9e3; border-radius: 10px;
    padding: 16px; cursor: pointer; transition: border-color 0.15s;
  }
  .emp-card:hover { border-color: #d4c9b8; }
  .emp-card.open { border-color: #f28324; box-shadow: 0 0 0 1px #f28324; }
  .card-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .card-role { font-size: 12px; color: #999; margin-bottom: 10px; }
  .card-dept { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: #f3f4f6; color: #555; }

  /* COMPACT VIEW */
  .emp-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #ece9e3; }
  .emp-table th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: #bbb; padding: 10px 14px; border-bottom: 1px solid #ece9e3; text-align: left; background: #fafaf8; }
  .emp-table td { font-size: 13px; padding: 10px 14px; border-bottom: 1px solid #f3f2ef; color: #333; cursor: pointer; }
  .emp-table tr:last-child td { border-bottom: none; }
  .emp-table tr:hover td { background: #fafaf8; }
  .emp-table tr.open td { background: #fff8f2; }

  /* Detail panel */
  .detail-panel {
    background: #fafaf8; border: 1px solid #f28324;
    border-top: none; box-shadow: 0 0 0 1px #f28324;
    border-radius: 0 0 8px 8px; margin-bottom: 10px; display: none;
  }
  .detail-panel.visible { display: block; }

  .panel-tabs { display: flex; border-bottom: 1px solid #ece9e3; background: #fff; }
  .panel-tab {
    padding: 12px 18px; font-size: 13px; font-weight: 500; color: #999;
    border: none; background: none; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .panel-tab.active { color: #f28324; border-bottom-color: #f28324; }

  .panel-content { padding: 20px; display: none; }
  .panel-content.active { display: block; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .form-group label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #bbb; margin-bottom: 5px; }
  .form-group.full { grid-column: span 2; }

  /* Leave */
  .leave-setup { background: #fff8f2; border: 1px solid #f28324; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .leave-setup p { font-size: 13px; color: #666; margin-bottom: 12px; }
  .leave-setup strong { color: #1a1a1a; }
  .leave-setup-row { display: flex; gap: 10px; align-items: center; }
  .leave-setup-row input { max-width: 120px; }

  .leave-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .leave-card { background: #fff; border: 1px solid #ece9e3; border-radius: 8px; padding: 12px; text-align: center; }
  .leave-card .num { font-size: 22px; font-weight: 500; }
  .leave-card .lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: #bbb; margin-top: 2px; }

  /* Docs */
  .docs-list { display: flex; flex-direction: column; gap: 8px; }
  .doc-item { background: #fff; border: 1px solid #ece9e3; border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  .doc-icon { font-size: 16px; flex-shrink: 0; }
  .doc-name { font-size: 13px; font-weight: 500; flex: 1; }
  .doc-meta { font-size: 11px; color: #999; margin-top: 2px; }
  .doc-link { font-size: 12px; color: #f28324; text-decoration: none; font-weight: 600; white-space: nowrap; }
  .doc-link:hover { text-decoration: underline; }

  /* Notes */
  .notes-content { background: #fff; border: 1px solid #ece9e3; border-radius: 8px; padding: 14px 16px; font-size: 13px; color: #444; line-height: 1.6; min-height: 80px; }
  .notes-content.empty { color: #bbb; font-style: italic; }

  /* Actions */
  .action-row { display: flex; gap: 10px; padding-top: 16px; border-top: 1px solid #ece9e3; }
  .btn-save { background: #f28324; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; }
  .btn-save:hover { background: #d4711e; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost-sm { background: none; color: #999; border: 1px solid #e0ddd8; border-radius: 8px; padding: 10px 16px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-ghost-sm:hover { background: #f3f3f1; }

  /* States */
  .state-msg { text-align: center; padding: 40px 0; color: #bbb; font-size: 14px; }
  .state-msg strong { display: block; color: #888; margin-bottom: 4px; font-size: 15px; }
  .loading { display: flex; gap: 5px; justify-content: center; padding: 48px 0; }
  .loading span { width: 7px; height: 7px; border-radius: 50%; background: #f28324; opacity: 0.4; animation: pulse 1.2s infinite; }
  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: transform 0.25s ease; z-index: 100; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { background: #1b5e20; }
  .toast.err { background: #b71c1c; }

  @media (max-width: 560px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: span 1; }
    .leave-summary { grid-template-columns: repeat(2, 1fr); }
    .emp-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <div>
      <p class="page-title">HR Dashboard</p>
      <p class="page-sub" id="pageSub">Loading…</p>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="s-total">—</div><div class="stat-lbl">Total staff</div></div>
    <div class="stat-card"><div class="stat-num" id="s-current">—</div><div class="stat-lbl">Current</div></div>
    <div class="stat-card"><div class="stat-num" id="s-depts">—</div><div class="stat-lbl">Departments</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search by name, role, department…" oninput="onSearch()" />
    </div>
    <select id="deptFilter" onchange="onSearch()">
      <option value="">All departments</option>
      <option>Administration</option>
      <option>Maintenance</option>
      <option>Production</option>
      <option>Sales</option>
      <option>Other Departments</option>
    </select>
    <button class="former-toggle" id="formerToggle" onclick="toggleFormer()">👁 Show former</button>
    <div class="view-toggle">
      <button class="view-btn active" id="vlist" onclick="setView('list')" title="List">☰</button>
      <button class="view-btn" id="vgrid" onclick="setView('grid')" title="Grid">⊞</button>
      <button class="view-btn" id="vcompact" onclick="setView('compact')" title="Compact">≡</button>
    </div>
  </div>

  <div id="resultsMeta" class="results-header"></div>
  <div id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const WORKER = 'https://joalku-production-editer.dholmes127.workers.dev';
  const EMP_DB  = 'eed92733827e8247a88f07bf685efb22';
  const LEAVE_DB= '1c392733827e83c7a94a07d5beba9dda';
  const DOC_DB  = '22c92733827e827cbc10077280514965';

  let allEmployees = [];
  let allLeave = [];
  let allDocs = [];
  let openId = null;
  let activeTab = {};
  let searchTimer = null;
  let showFormer = false;
  let currentView = 'list';

  window.onload = load;

  async function load() {
    document.getElementById('list').innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
    try {
      const [empData, leaveData, docData] = await Promise.all([
        queryDB(EMP_DB, null, [{property:'Name',direction:'ascending'}]),
        queryDB(LEAVE_DB, null, null),
        queryDB(DOC_DB, null, null)
      ]);
      allEmployees = empData.results;
      allLeave = leaveData.results;
      allDocs = docData.results;
      updateStats();
      document.getElementById('pageSub').textContent = `${allEmployees.filter(e=>getProp(e,'Status','select')==='Current').length} current employees`;
      applyFiltersAndRender();
    } catch(e) {
      document.getElementById('pageSub').textContent = '';
      document.getElementById('list').innerHTML = `<div class="state-msg"><strong>Could not connect</strong>${e.message}</div>`;
    }
  }

  async function queryDB(dbId, filter, sorts) {
    const body = { page_size: 100 };
    if (filter) body.filter = filter;
    if (sorts) body.sorts = sorts;
    const r = await fetch(`${WORKER}/v1/databases/${dbId}/query`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message||'API error'); }
    return r.json();
  }

  function getProp(page, name, type='rich_text') {
    const p = page.properties[name];
    if (!p) return '—';
    if (type==='title')     return p.title?.[0]?.plain_text||'—';
    if (type==='rich_text') return p.rich_text?.[0]?.plain_text||'—';
    if (type==='select')    return p.select?.name||'—';
    if (type==='email')     return p.email||'—';
    if (type==='phone')     return p.phone_number||'—';
    if (type==='date')      return p.date?.start||'—';
    if (type==='checkbox')  return p.checkbox||false;
    if (type==='number')    return p.number??null;
    if (type==='formula')   return p.formula?.number??p.formula?.string??null;
    if (type==='files')     return p.files||[];
    return '—';
  }

  function getLeaveRec(empName) {
    return allLeave.find(l => {
      const n = getProp(l,'Name','title');
      const firstName = empName.split(' ')[0].toLowerCase();
      return n.toLowerCase().includes(firstName);
    }) || null;
  }

  function getDocsFor(empName) {
    const firstName = empName.split(' ')[0].toLowerCase();
    return allDocs.filter(d => getProp(d,'Employee','rich_text').toLowerCase().includes(firstName) || getProp(d,'Name','title').toLowerCase().includes(firstName));
  }

  function updateStats() {
    const current = allEmployees.filter(e=>getProp(e,'Status','select')==='Current').length;
    const depts = new Set(allEmployees.map(e=>getProp(e,'Department','select')).filter(d=>d!=='—')).size;
    document.getElementById('s-total').textContent = allEmployees.length;
    document.getElementById('s-current').textContent = current;
    document.getElementById('s-depts').textContent = depts;
  }

  function fmtDate(d) {
    if (!d||d==='—') return '—';
    return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  }

  function setView(v) {
    currentView = v;
    ['list','grid','compact'].forEach(x => document.getElementById('v'+x).classList.toggle('active', x===v));
    openId = null;
    applyFiltersAndRender();
  }

  function toggleFormer() {
    showFormer = !showFormer;
    document.getElementById('formerToggle').classList.toggle('active', showFormer);
    document.getElementById('formerToggle').textContent = showFormer ? '👁 Hide former' : '👁 Show former';
    openId = null;
    applyFiltersAndRender();
  }

  function applyFiltersAndRender() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const dept = document.getElementById('deptFilter').value;
    let filtered = allEmployees;
    if (!showFormer) filtered = filtered.filter(e => getProp(e,'Status','select') !== 'Former');
    if (dept) filtered = filtered.filter(e => getProp(e,'Department','select') === dept);
    if (q) filtered = filtered.filter(e =>
      getProp(e,'Name','title').toLowerCase().includes(q) ||
      getProp(e,'Role','select').toLowerCase().includes(q) ||
      getProp(e,'Department','select').toLowerCase().includes(q) ||
      getProp(e,'Email','email').toLowerCase().includes(q)
    );
    document.getElementById('resultsMeta').textContent = `${filtered.length} employee${filtered.length!==1?'s':''}`;
    if (currentView === 'list') renderList(filtered);
    else if (currentView === 'grid') renderGrid(filtered);
    else renderCompact(filtered);
  }

  function onSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applyFiltersAndRender, 200);
  }

  // ── LIST VIEW ──────────────────────────────────────────────────────────────
  function renderList(employees) {
    const list = document.getElementById('list');
    if (!employees.length) { list.innerHTML = '<div class="state-msg"><strong>No employees found</strong></div>'; return; }
    list.innerHTML = '';
    employees.forEach(emp => {
      const id = emp.id;
      const name   = getProp(emp,'Name','title');
      const role   = getProp(emp,'Role','select');
      const dept   = getProp(emp,'Department','select');
      const status = getProp(emp,'Status','select');
      const email  = getProp(emp,'Email','email');
      const display = role !== '—' ? role : dept !== '—' ? dept : '';

      const row = document.createElement('div');
      row.className = 'emp-row' + (openId===id?' open':'');
      row.dataset.id = id;
      row.innerHTML = `
        <div class="status-dot ${status==='Current'?'current':'former'}"></div>
        <div class="emp-info">
          <div class="emp-name">${name}</div>
          <div class="emp-meta">
            ${display?`<span>${display}</span>`:''}
            ${email!=='—'?`<span>${email}</span>`:''}
          </div>
        </div>
      `;
      row.onclick = () => toggleDetail(id, emp);
      list.appendChild(row);
      list.appendChild(buildDetailPanel(id, emp));
    });
  }

  // ── GRID VIEW ──────────────────────────────────────────────────────────────
  function renderGrid(employees) {
    const list = document.getElementById('list');
    if (!employees.length) { list.innerHTML = '<div class="state-msg"><strong>No employees found</strong></div>'; return; }
    list.innerHTML = '';

    const grid = document.createElement('div');
    grid.className = 'emp-grid';

    employees.forEach(emp => {
      const id = emp.id;
      const name   = getProp(emp,'Name','title');
      const role   = getProp(emp,'Role','select');
      const dept   = getProp(emp,'Department','select');
      const status = getProp(emp,'Status','select');
      const display = role !== '—' ? role : dept !== '—' ? dept : '';

      const card = document.createElement('div');
      card.className = 'emp-card' + (openId===id?' open':'');
      card.dataset.id = id;
      card.innerHTML = `
        <div class="card-name">${name}</div>
        <div class="card-role">${display}</div>
        ${dept!=='—'?`<span class="card-dept">${dept}</span>`:''}
      `;
      card.onclick = () => toggleDetailGrid(id, emp, grid);
      grid.appendChild(card);
    });

    list.appendChild(grid);

    if (openId) {
      const panel = buildDetailPanel(openId, employees.find(e=>e.id===openId));
      list.appendChild(panel);
      panel.classList.add('visible');
      panel.style.borderRadius = '8px';
      panel.style.borderTop = '1px solid #f28324';
    }
  }

  function toggleDetailGrid(id, emp, grid) {
    const list = document.getElementById('list');
    const existing = document.getElementById('detail-'+id);
    if (existing) {
      openId = null;
      grid.querySelectorAll('.emp-card').forEach(c => c.classList.remove('open'));
      existing.remove();
      return;
    }
    list.querySelectorAll('.detail-panel').forEach(p => p.remove());
    grid.querySelectorAll('.emp-card').forEach(c => c.classList.remove('open'));
    document.getElementById(id)?.classList.add('open');
    grid.querySelectorAll('.emp-card').forEach(c => { if(c.dataset.id===id) c.classList.add('open'); });
    openId = id;
    const panel = buildDetailPanel(id, emp);
    panel.classList.add('visible');
    panel.style.borderRadius = '8px';
    panel.style.borderTop = '1px solid #f28324';
    list.appendChild(panel);
    panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  // ── COMPACT VIEW ────────────────────────────────────────────────────────────
  function renderCompact(employees) {
    const list = document.getElementById('list');
    if (!employees.length) { list.innerHTML = '<div class="state-msg"><strong>No employees found</strong></div>'; return; }
    list.innerHTML = '';

    const table = document.createElement('table');
    table.className = 'emp-table';
    table.innerHTML = `<thead><tr><th>Name</th><th>Role</th><th>Department</th><th>Status</th><th>Email</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    employees.forEach(emp => {
      const id = emp.id;
      const name   = getProp(emp,'Name','title');
      const role   = getProp(emp,'Role','select');
      const dept   = getProp(emp,'Department','select');
      const status = getProp(emp,'Status','select');
      const email  = getProp(emp,'Email','email');

      const tr = document.createElement('tr');
      tr.className = openId===id?'open':'';
      tr.dataset.id = id;
      tr.innerHTML = `<td><strong>${name}</strong></td><td>${role!=='—'?role:''}</td><td>${dept!=='—'?dept:''}</td><td>${status}</td><td>${email!=='—'?email:''}</td>`;
      tr.onclick = () => toggleDetailCompact(id, emp, table);
      tbody.appendChild(tr);

      if (openId===id) {
        const panelRow = document.createElement('tr');
        panelRow.id = 'panel-row-'+id;
        const td = document.createElement('td');
        td.colSpan = 5;
        td.style.padding = '0';
        const panel = buildDetailPanel(id, emp);
        panel.style.borderRadius = '0';
        panel.style.border = 'none';
        panel.style.boxShadow = 'none';
        panel.style.borderTop = '1px solid #f28324';
        panel.classList.add('visible');
        td.appendChild(panel);
        panelRow.appendChild(td);
        tbody.appendChild(panelRow);
      }
    });

    list.appendChild(table);
  }

  function toggleDetailCompact(id, emp, table) {
    if (openId === id) { openId = null; } else { openId = id; }
    renderCompact(getFilteredEmployees());
  }

  function getFilteredEmployees() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const dept = document.getElementById('deptFilter').value;
    let filtered = allEmployees;
    if (!showFormer) filtered = filtered.filter(e => getProp(e,'Status','select') !== 'Former');
    if (dept) filtered = filtered.filter(e => getProp(e,'Department','select') === dept);
    if (q) filtered = filtered.filter(e =>
      getProp(e,'Name','title').toLowerCase().includes(q) ||
      getProp(e,'Role','select').toLowerCase().includes(q) ||
      getProp(e,'Department','select').toLowerCase().includes(q)
    );
    return filtered;
  }

  // ── DETAIL PANEL ───────────────────────────────────────────────────────────
  function buildDetailPanel(id, emp) {
    const name    = getProp(emp,'Name','title');
    const role    = getProp(emp,'Role','select');
    const dept    = getProp(emp,'Department','select');
    const status  = getProp(emp,'Status','select');
    const email   = getProp(emp,'Email','email');
    const phone   = getProp(emp,'Phone','phone');
    const startCo = getProp(emp,'Start date in company','date');
    const startPos= getProp(emp,'Start date in position','date');
    const salary  = getProp(emp,'Fixed salary','number');
    const bonus   = getProp(emp,'Annual bonus','number');

    const leaveRec = getLeaveRec(name);
    const total = leaveRec ? (getProp(leaveRec,'Total Leave Days','number')||0) : 0;
    const taken = leaveRec ? (getProp(leaveRec,'Leave Days Taken','number')||0) : 0;
    const sick  = leaveRec ? (getProp(leaveRec,'Sick Leave Days','number')||0) : 0;
    const left  = total - taken;

    const docs = getDocsFor(name);
    const tab  = activeTab[id] || 'profile';

    const docsHtml = docs.length ? docs.map(d => {
      const dn = getProp(d,'Name','title');
      const dt = getProp(d,'Document Type','select');
      const dy = getProp(d,'Year','select');
      const files = getProp(d,'File','files');
      const fileUrl = files.length ? (files[0].file?.url || files[0].external?.url || '') : '';
      const notionUrl = `https://app.notion.com/p/${d.id.replace(/-/g,'')}`;
      const docEmoji = dt==='Contract'?'📋':dt==='Warning'?'⚠️':dt==='Loan'?'💰':dt==='Leave'?'🏖️':'📄';
      return `<div class="doc-item">
        <div class="doc-icon">${docEmoji}</div>
        <div style="flex:1">
          <div class="doc-name">${dn}</div>
          <div class="doc-meta">${[dt,dy].filter(x=>x!=='—').join(' · ')}</div>
        </div>
        <a href="${fileUrl||notionUrl}" target="_blank" class="doc-link">${fileUrl?'Open file':'View →'}</a>
      </div>`;
    }).join('') : '<div class="state-msg" style="padding:20px 0"><strong>No documents</strong></div>';

    const leaveContent = leaveRec ? `
      <div class="leave-summary">
        <div class="leave-card"><div class="num">${total}</div><div class="lbl">Total</div></div>
        <div class="leave-card"><div class="num">${taken}</div><div class="lbl">Taken</div></div>
        <div class="leave-card"><div class="num">${left}</div><div class="lbl">Left</div></div>
        <div class="leave-card"><div class="num">${sick}</div><div class="lbl">Sick</div></div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Leave Days Taken</label>
          <input type="number" id="f-taken-${id}" value="${taken}" min="0" step="0.5" />
        </div>
        <div class="form-group">
          <label>Sick Leave Days</label>
          <input type="number" id="f-sick-${id}" value="${sick}" min="0" step="0.5" />
        </div>
      </div>
      <div class="action-row">
        <button class="btn-save" id="btn-leave-${id}" onclick="saveLeave('${id}','${leaveRec.id}',event)">Save leave</button>
        <button class="btn-ghost-sm" onclick="closeDetail(event)">Cancel</button>
      </div>
    ` : `
      <div class="leave-setup">
        <p><strong>${name}</strong> doesn't have a leave record yet. How many leave days are they entitled to?</p>
        <div class="leave-setup-row">
          <input type="number" id="f-newleave-${id}" placeholder="e.g. 21" min="0" style="max-width:120px" />
          <button class="btn-save" onclick="createLeaveRecord('${id}','${name}',event)">Set up leave</button>
        </div>
      </div>
    `;

    const detail = document.createElement('div');
    detail.className = 'detail-panel';
    detail.id = 'detail-'+id;
    detail.innerHTML = `
      <div class="panel-tabs">
        <button class="panel-tab ${tab==='profile'?'active':''}" onclick="switchTab('${id}','profile',event)">Profile</button>
        <button class="panel-tab ${tab==='docs'?'active':''}" onclick="switchTab('${id}','docs',event)">Documents (${docs.length})</button>
        <button class="panel-tab ${tab==='leave'?'active':''}" onclick="switchTab('${id}','leave',event)">Leave</button>
      </div>

      <div class="panel-content ${tab==='profile'?'active':''}" id="tab-profile-${id}">
        <div class="form-grid">
          <div class="form-group">
            <label>Full name</label>
            <input type="text" id="f-name-${id}" value="${name!=='—'?name:''}" />
          </div>
          <div class="form-group">
            <label>Role</label>
            <select id="f-role-${id}">
              <option value="">— select —</option>
              ${['Administrator','Electrician','Mechanic','Welder','Batching Plant Operator','Driver','Logistics','Quality Control','Cleaner','Security','Sales Representative'].map(r=>`<option ${role===r?'selected':''}>${r}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Department</label>
            <select id="f-dept-${id}">
              <option value="">— select —</option>
              ${['Administration','Maintenance','Production','Sales','Other Departments'].map(d=>`<option ${dept===d?'selected':''}>${d}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="f-status-${id}">
              <option ${status==='Current'?'selected':''}>Current</option>
              <option ${status==='Former'?'selected':''}>Former</option>
            </select>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="f-email-${id}" value="${email!=='—'?email:''}" />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="f-phone-${id}" value="${phone!=='—'?phone:''}" />
          </div>
          <div class="form-group">
            <label>Start date in company</label>
            <input type="date" id="f-startco-${id}" value="${startCo!=='—'?startCo:''}" />
          </div>
          <div class="form-group">
            <label>Start date in position</label>
            <input type="date" id="f-startpos-${id}" value="${startPos!=='—'?startPos:''}" />
          </div>
          <div class="form-group">
            <label>Fixed salary</label>
            <input type="number" id="f-salary-${id}" value="${salary!=null?salary:''}" />
          </div>
          <div class="form-group">
            <label>Annual bonus</label>
            <input type="number" id="f-bonus-${id}" value="${bonus!=null?bonus:''}" />
          </div>
        </div>
        <div class="action-row">
          <button class="btn-save" id="btn-profile-${id}" onclick="saveProfile('${id}',event)">Save changes</button>
          <button class="btn-ghost-sm" onclick="closeDetail(event)">Cancel</button>
        </div>
      </div>

      <div class="panel-content ${tab==='docs'?'active':''}" id="tab-docs-${id}">
        <div class="docs-list">${docsHtml}</div>
      </div>

      <div class="panel-content ${tab==='leave'?'active':''}" id="tab-leave-${id}">
        ${leaveContent}
      </div>
    `;
    return detail;
  }

  function toggleDetail(id, emp) {
    const list = document.getElementById('list');
    if (openId === id) {
      openId = null;
      document.querySelectorAll('.emp-row').forEach(r => r.classList.remove('open'));
      document.querySelectorAll('.detail-panel').forEach(d => d.remove());
      return;
    }
    document.querySelectorAll('.emp-row').forEach(r => r.classList.remove('open'));
    document.querySelectorAll('.detail-panel').forEach(d => d.remove());
    openId = id;
    const row = list.querySelector(`.emp-row[data-id="${id}"]`);
    if (row) row.classList.add('open');
    const panel = buildDetailPanel(id, emp);
    panel.classList.add('visible');
    row.insertAdjacentElement('afterend', panel);
    panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  function closeDetail(e) {
    e.stopPropagation();
    openId = null;
    document.querySelectorAll('.emp-row,.emp-card').forEach(r => r.classList.remove('open'));
    document.querySelectorAll('.detail-panel').forEach(d => d.remove());
  }

  function switchTab(id, tab, e) {
    e.stopPropagation();
    activeTab[id] = tab;
    const panel = document.getElementById('detail-'+id);
    if (!panel) return;
    panel.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
    panel.querySelectorAll('.panel-content').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    const content = document.getElementById(`tab-${tab}-${id}`);
    if (content) content.classList.add('active');
  }

  async function saveProfile(id, e) {
    e.stopPropagation();
    const btn = document.getElementById('btn-profile-'+id);
    btn.disabled=true; btn.textContent='Saving…';
    const props = {
      'Name': { title: [{ type:'text', text:{ content: document.getElementById('f-name-'+id).value.trim() } }] },
      'Email': { email: document.getElementById('f-email-'+id).value.trim()||null },
      'Phone': { phone_number: document.getElementById('f-phone-'+id).value.trim()||null },
    };
    const role    = document.getElementById('f-role-'+id).value;
    const dept    = document.getElementById('f-dept-'+id).value;
    const status  = document.getElementById('f-status-'+id).value;
    const startCo = document.getElementById('f-startco-'+id).value;
    const startPos= document.getElementById('f-startpos-'+id).value;
    const salary  = parseFloat(document.getElementById('f-salary-'+id).value);
    const bonus   = parseFloat(document.getElementById('f-bonus-'+id).value);
    if (role) props['Role'] = { select: { name: role } };
    if (dept) props['Department'] = { select: { name: dept } };
    if (status) props['Status'] = { select: { name: status } };
    if (startCo) props['Start date in company'] = { date: { start: startCo } };
    if (startPos) props['Start date in position'] = { date: { start: startPos } };
    if (!isNaN(salary)) props['Fixed salary'] = { number: salary };
    if (!isNaN(bonus)) props['Annual bonus'] = { number: bonus };
    try {
      const r = await fetch(`${WORKER}/v1/pages/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({properties:props}) });
      if (!r.ok) throw new Error();
      toast('Profile saved','ok');
      btn.textContent='Saved ✓';
      setTimeout(()=>{ btn.disabled=false; btn.textContent='Save changes'; },2000);
      openId=null; load();
    } catch { toast('Failed to save','err'); btn.disabled=false; btn.textContent='Save changes'; }
  }

  async function saveLeave(empId, leaveId, e) {
    e.stopPropagation();
    const btn = document.getElementById('btn-leave-'+empId);
    btn.disabled=true; btn.textContent='Saving…';
    const taken = parseFloat(document.getElementById('f-taken-'+empId).value)||0;
    const sick  = parseFloat(document.getElementById('f-sick-'+empId).value)||0;
    try {
      const r = await fetch(`${WORKER}/v1/pages/${leaveId}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ properties: { 'Leave Days Taken':{ number:taken }, 'Sick Leave Days':{ number:sick } } }) });
      if (!r.ok) throw new Error();
      toast('Leave updated','ok');
      btn.textContent='Saved ✓';
      setTimeout(()=>{ btn.disabled=false; btn.textContent='Save leave'; },2000);
      openId=null; load();
    } catch { toast('Failed to save','err'); btn.disabled=false; btn.textContent='Save leave'; }
  }

  async function createLeaveRecord(empId, empName, e) {
    e.stopPropagation();
    const days = parseFloat(document.getElementById('f-newleave-'+empId).value);
    if (!days || isNaN(days)) { toast('Enter number of days','err'); return; }
    const btn = e.target;
    btn.disabled=true; btn.textContent='Creating…';
    try {
      const r = await fetch(`${WORKER}/v1/pages`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          parent: { database_id: LEAVE_DB },
          properties: {
            'Name': { title: [{ type:'text', text:{ content: `${empName} - ${new Date().getFullYear()}` } }] },
            'Total Leave Days': { number: days },
            'Leave Days Taken': { number: 0 },
            'Sick Leave Days': { number: 0 }
          }
        })
      });
      if (!r.ok) throw new Error();
      toast('Leave record created','ok');
      openId=null; load();
    } catch { toast('Failed to create','err'); btn.disabled=false; btn.textContent='Set up leave'; }
  }

  function toast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent=msg; t.className='toast show '+type;
    setTimeout(()=>t.className='toast',3000);
  }
</script>
</body>
</html>
