<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Tracker — Joalku</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f9f8f6;
    color: #1a1a1a;
    min-height: 100vh;
  }

  .page { max-width: 720px; margin: 0 auto; padding: 32px 24px 80px; }
  .page-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: #999; margin-bottom: 28px; }

  .search-wrap { position: relative; margin-bottom: 20px; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #aaa; pointer-events: none; }

  input[type="text"], input[type="number"] {
    width: 100%; padding: 10px 14px; border: 1px solid #e0ddd8;
    border-radius: 8px; font-size: 14px; color: #1a1a1a;
    background: #fff; outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="number"]:focus { border-color: #f28324; }
  input[type="text"]::placeholder { color: #bbb; }
  #searchInput { padding-left: 40px; }

  .emp-row {
    background: #fff; border: 1px solid #ece9e3; border-radius: 8px;
    padding: 16px 20px; cursor: pointer; transition: border-color 0.15s;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; margin-bottom: 2px;
  }
  .emp-row:hover { border-color: #d4c9b8; }
  .emp-row.open { border-color: #f28324; box-shadow: 0 0 0 1px #f28324; border-radius: 8px 8px 0 0; margin-bottom: 0; }

  .emp-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .emp-meta { font-size: 12px; color: #999; display: flex; gap: 12px; flex-wrap: wrap; }

  .leave-pills { display: flex; gap: 8px; flex-shrink: 0; }
  .pill {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; white-space: nowrap;
  }
  .pill.leave { background: #e8f5e9; color: #1b5e20; }
  .pill.sick { background: #e3f2fd; color: #0d47a1; }
  .pill.low { background: #fff3e0; color: #c65a00; }

  .detail-panel {
    background: #fafaf8; border: 1px solid #f28324;
    border-top: none; box-shadow: 0 0 0 1px #f28324;
    border-radius: 0 0 8px 8px; padding: 20px;
    margin-bottom: 10px; display: none;
  }
  .detail-panel.visible { display: block; }

  .summary-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; margin-bottom: 20px;
  }

  .summary-card {
    background: #fff; border: 1px solid #ece9e3;
    border-radius: 8px; padding: 12px 14px; text-align: center;
  }
  .summary-card .num { font-size: 22px; font-weight: 500; color: #1a1a1a; }
  .summary-card .lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #bbb; margin-top: 2px; }
  .summary-card.highlight .num { color: #f28324; }

  .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .edit-group label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #bbb; margin-bottom: 5px; }

  .action-row {
    display: flex; gap: 10px; align-items: center;
    padding-top: 16px; border-top: 1px solid #ece9e3;
  }

  .btn-save {
    background: #f28324; color: #fff; border: none;
    border-radius: 8px; padding: 10px 20px; font-size: 13px;
    font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .btn-save:hover { background: #d4711e; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-cancel {
    background: none; color: #999; border: 1px solid #e0ddd8;
    border-radius: 8px; padding: 10px 16px; font-size: 13px;
    font-weight: 500; cursor: pointer;
  }
  .btn-cancel:hover { background: #f3f3f1; }

  .state-msg { text-align: center; padding: 48px 0; color: #bbb; font-size: 14px; }
  .state-msg strong { display: block; color: #888; margin-bottom: 4px; font-size: 15px; }

  .loading { display: flex; gap: 5px; justify-content: center; padding: 48px 0; }
  .loading span { width: 7px; height: 7px; border-radius: 50%; background: #f28324; opacity: 0.4; animation: pulse 1.2s infinite; }
  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #1a1a1a; color: #fff; padding: 10px 20px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    transition: transform 0.25s ease; z-index: 100; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { background: #1b5e20; }
  .toast.err { background: #b71c1c; }

  .results-header { font-size: 12px; color: #bbb; margin-bottom: 10px; }

  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .leave-pills { display: none; }
  }
</style>
</head>
<body>
<div class="page">
  <p class="page-title">Leave Tracker</p>
  <p class="page-sub" id="pageSub">Loading…</p>

  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search by employee name…" oninput="onSearch()" />
  </div>

  <div id="resultsMeta" class="results-header"></div>
  <div id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const WORKER = 'https://joalku-production-editer.dholmes127.workers.dev';
  const DB = '39f92733827e835987ce81ae3982c9fa';

  let allPages = [];
  let openId = null;
  let searchTimer = null;

  window.onload = load;

  async function load() {
    document.getElementById('list').innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
    try {
      const data = await query([{ property: 'Name', direction: 'ascending' }]);
      allPages = data.results;
      document.getElementById('pageSub').textContent = `${allPages.length} employee${allPages.length!==1?'s':''}`;
      render(allPages);
    } catch(e) {
      document.getElementById('pageSub').textContent = '';
      document.getElementById('list').innerHTML = `<div class="state-msg"><strong>Could not connect</strong>${e.message}</div>`;
    }
  }

  async function query(sorts) {
    const body = { page_size: 100 };
    if (sorts) body.sorts = sorts;
    const r = await fetch(`${WORKER}/v1/databases/${DB}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'API error'); }
    return r.json();
  }

  function getN(page, name) {
    return page.properties[name]?.number ?? null;
  }

  function getT(page, name, type='rich_text') {
    const p = page.properties[name];
    if (!p) return '—';
    if (type==='title') return p.title?.[0]?.plain_text || '—';
    if (type==='rich_text') return p.rich_text?.[0]?.plain_text || '—';
    if (type==='select') return p.select?.name || '—';
    if (type==='formula') return p.formula?.number ?? p.formula?.string ?? '—';
    return '—';
  }

  function render(pages) {
    const list = document.getElementById('list');
    const meta = document.getElementById('resultsMeta');
    if (!pages.length) {
      meta.textContent = '';
      list.innerHTML = '<div class="state-msg"><strong>No employees found</strong>Try a different search</div>';
      return;
    }
    meta.textContent = `${pages.length} employee${pages.length!==1?'s':''}`;
    list.innerHTML = '';

    pages.forEach(p => {
      const id = p.id;
      const name        = getT(p, 'Name', 'title');
      const dept        = getT(p, 'Department');
      const year        = getT(p, 'Year', 'select');
      const total       = getN(p, 'Total Leave Days') ?? 0;
      const taken       = getN(p, 'Leave Days Taken') ?? 0;
      const sick        = getN(p, 'Sick Leave Days') ?? 0;
      const left        = getT(p, 'Leave Days Left', 'formula');
      const leftNum     = typeof left === 'number' ? left : (total - taken);
      const isLow       = leftNum <= 5;

      const row = document.createElement('div');
      row.className = 'emp-row' + (openId===id?' open':'');
      row.dataset.id = id;
      row.innerHTML = `
        <div style="flex:1;min-width:0">
          <div class="emp-name">${name}</div>
          <div class="emp-meta">
            ${dept!=='—'?`<span>${dept}</span>`:''}
            ${year!=='—'?`<span>${year}</span>`:''}
          </div>
        </div>
        <div class="leave-pills">
          <div class="pill ${isLow?'low':'leave'}">${leftNum} days left</div>
          ${sick > 0 ? `<div class="pill sick">${sick} sick</div>` : ''}
        </div>
      `;
      row.onclick = () => toggleDetail(id);
      list.appendChild(row);

      const detail = document.createElement('div');
      detail.className = 'detail-panel' + (openId===id?' visible':'');
      detail.id = 'detail-'+id;
      detail.innerHTML = `
        <div class="summary-grid">
          <div class="summary-card">
            <div class="num">${total}</div>
            <div class="lbl">Total days</div>
          </div>
          <div class="summary-card">
            <div class="num">${taken}</div>
            <div class="lbl">Days taken</div>
          </div>
          <div class="summary-card ${isLow?'highlight':''}">
            <div class="num">${leftNum}</div>
            <div class="lbl">Days left</div>
          </div>
          <div class="summary-card">
            <div class="num">${sick}</div>
            <div class="lbl">Sick days</div>
          </div>
        </div>
        <div class="edit-grid">
          <div class="edit-group">
            <label>Leave Days Taken</label>
            <input type="number" id="f-taken-${id}" value="${taken}" min="0" step="0.5" />
          </div>
          <div class="edit-group">
            <label>Sick Leave Days</label>
            <input type="number" id="f-sick-${id}" value="${sick}" min="0" step="0.5" />
          </div>
        </div>
        <div class="action-row">
          <button class="btn-save" id="btn-${id}" onclick="saveLeave('${id}', event)">Save changes</button>
          <button class="btn-cancel" onclick="closeDetail(event)">Cancel</button>
        </div>
      `;
      list.appendChild(detail);
    });
  }

  function toggleDetail(id) {
    openId = openId===id ? null : id;
    document.querySelectorAll('.emp-row').forEach(r => r.classList.toggle('open', r.dataset.id===openId));
    document.querySelectorAll('.detail-panel').forEach(d => d.classList.toggle('visible', d.id==='detail-'+openId));
    if (openId) {
      const el = document.getElementById('detail-'+openId);
      el && el.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
  }

  function closeDetail(e) {
    e.stopPropagation();
    openId = null;
    document.querySelectorAll('.emp-row').forEach(r => r.classList.remove('open'));
    document.querySelectorAll('.detail-panel').forEach(d => d.classList.remove('visible'));
  }

  async function saveLeave(id, e) {
    e.stopPropagation();
    const btn = document.getElementById('btn-'+id);
    const taken = parseFloat(document.getElementById('f-taken-'+id).value) || 0;
    const sick  = parseFloat(document.getElementById('f-sick-'+id).value) || 0;

    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      const r = await fetch(`${WORKER}/v1/pages/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          properties: {
            'Leave Days Taken': { number: taken },
            'Sick Leave Days': { number: sick }
          }
        })
      });
      if (!r.ok) throw new Error('Save failed');
      toast('Leave updated', 'ok');
      btn.textContent = 'Saved ✓';
      setTimeout(()=>{ btn.disabled=false; btn.textContent='Save changes'; },2000);
      openId = null;
      load();
    } catch(err) {
      toast('Failed to save', 'err');
      btn.disabled=false; btn.textContent='Save changes';
    }
  }

  function onSearch() {
    clearTimeout(searchTimer);
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!q) { render(allPages); return; }
    searchTimer = setTimeout(()=>{
      const filtered = allPages.filter(p =>
        getT(p,'Name','title').toLowerCase().includes(q) ||
        getT(p,'Department').toLowerCase().includes(q)
      );
      render(filtered);
    }, 200);
  }

  function toast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent=msg; t.className='toast show '+type;
    setTimeout(()=>t.className='toast',3000);
  }
</script>
</body>
</html>
