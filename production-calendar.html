<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Calendar — Joalku</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f9f8f6; color: #1a1a1a; min-height: 100vh;
  }

  .page { max-width: 900px; margin: 0 auto; padding: 32px 24px 80px; }

  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .cal-title { font-size: 22px; font-weight: 500; }
  .cal-nav { display: flex; align-items: center; gap: 10px; }
  .nav-btn { background: #fff; border: 1px solid #e0ddd8; border-radius: 8px; padding: 8px 14px; font-size: 16px; cursor: pointer; color: #555; font-family: inherit; transition: background 0.15s; }
  .nav-btn:hover { background: #f0efeb; }
  .nav-label { font-size: 16px; font-weight: 500; min-width: 160px; text-align: center; }

  .view-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #fff; border: 1px solid #e0ddd8; border-radius: 10px; padding: 4px; width: fit-content; }
  .view-tab { padding: 8px 16px; font-size: 16px; font-weight: 500; border: none; background: none; cursor: pointer; border-radius: 7px; color: #999; transition: background 0.15s, color 0.15s; font-family: inherit; }
  .view-tab.active { background: #f28324; color: #fff; }

  .add-btn { background: #f28324; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; display: none; }
  .add-btn:hover { background: #d4711e; }
  .add-btn.visible { display: block; }

  .loading { display: flex; gap: 5px; justify-content: center; padding: 48px 0; }
  .loading span { width: 7px; height: 7px; border-radius: 50%; background: #f28324; opacity: 0.4; animation: pulse 1.2s infinite; }
  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  .day-group { margin-bottom: 24px; }
  .day-label { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #bbb; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .day-label.today-label { color: #f28324; }
  .day-label .today-dot { width: 6px; height: 6px; border-radius: 50%; background: #f28324; }

  .prod-card {
    background: #fff; border: 1px solid #ece9e3; border-radius: 10px;
    padding: 16px 18px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    margin-bottom: 8px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  }
  .prod-card:hover { border-color: #d4c9b8; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .prod-card-left { flex: 1; min-width: 0; }
  .prod-card-name { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  .prod-card-meta { display: flex; flex-wrap: wrap; gap: 12px; }
  .prod-card-meta span { font-size: 16px; color: #666; display: flex; align-items: center; gap: 5px; }
  .prod-time-badge { font-size: 14px; font-weight: 600; padding: 4px 12px; border-radius: 20px; flex-shrink: 0; align-self: flex-start; }
  .prod-time-badge.tbd { background: #fff3e0; color: #c65a00; }
  .prod-time-badge.set { background: #e8f5e9; color: #1b5e20; }
  .prod-time-badge.in-progress { background: #e6f1fb; color: #1a6fc4; }
  .prod-time-badge.completed { background: #e8f5e9; color: #1b5e20; }
  .prod-time-badge.cancelled { background: #fce4ec; color: #880e4f; }
  .empty-day { font-size: 16px; color: #ccc; padding: 12px 0; font-style: italic; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; width: 100%; max-width: 780px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); overflow: hidden; }
  .modal-header { padding: 20px 24px 0; border-bottom: 1px solid #ece9e3; }
  .modal-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .modal-meta { font-size: 16px; color: #999; margin-bottom: 14px; display: flex; gap: 14px; flex-wrap: wrap; }
  .modal-tabs { display: flex; gap: 0; }
  .modal-tab { padding: 12px 18px; font-size: 16px; font-weight: 500; color: #999; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; font-family: inherit; }
  .modal-tab.active { color: #f28324; border-bottom-color: #f28324; }
  .modal-tab.restricted { display: none; }
  .modal-tab.restricted.visible { display: block; }
  .modal-body { padding: 0; }
  .modal-content { display: none; }
  .modal-content.active { display: block; }
  .modal-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: #999; padding: 4px 8px; margin-top: -4px; }
  .modal-close:hover { color: #1a1a1a; }
  .modal-iframe { width: 100%; height: 560px; border: none; display: block; }
  .edit-frame { width: 100%; height: 700px; border: none; display: block; }
  .state-msg { text-align: center; padding: 48px 24px; color: #bbb; font-size: 16px; }
  .state-msg strong { display: block; color: #888; margin-bottom: 4px; font-size: 18px; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 16px; font-weight: 500; transition: transform 0.25s ease; z-index: 300; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="page">

  <div class="cal-header">
    <div class="cal-title">Production Schedule</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <button class="add-btn" id="addBtn" onclick="openAddModal()">+ Add Production</button>
      <div class="cal-nav">
        <button class="nav-btn" onclick="navigate(-1)">‹</button>
        <div class="nav-label" id="navLabel">—</div>
        <button class="nav-btn" onclick="navigate(1)">›</button>
        <button class="nav-btn" onclick="goToday()" style="font-size:14px;padding:8px 12px;">Today</button>
      </div>
    </div>
  </div>

  <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap;">
    <div class="view-tabs" style="margin-bottom:0;">
      <button class="view-tab active" id="vt-today" onclick="setView('today')">Today</button>
      <button class="view-tab" id="vt-upcoming" onclick="setView('upcoming')">Upcoming</button>
    </div>
    <div style="position:relative; flex:1; min-width:200px;">
      <input type="text" id="searchInput" placeholder="Search by name or client…" oninput="onSearch()"
        style="width:100%; padding:9px 12px; border:1px solid #e0ddd8; border-radius:8px; font-size:16px; font-family:inherit; outline:none;" />
    </div>
  </div>

  <div id="calBody">
    <div class="loading"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- Production Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title" id="modalTitle">—</div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-tabs">
        <button class="modal-tab active" id="mt-dispatch" onclick="switchModalTab('dispatch')">Dispatch</button>
        <button class="modal-tab restricted" id="mt-edit" onclick="switchModalTab('edit')">Edit Production</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-content active" id="mc-dispatch">
        <iframe class="modal-iframe" id="dispatchFrame" src="about:blank"></iframe>
      </div>
      <div class="modal-content" id="mc-edit">
        <iframe class="edit-frame" id="editFrame" src="about:blank"></iframe>
      </div>
    </div>
  </div>
</div>

<!-- Add Production Modal -->
<div class="modal-overlay" id="addModalOverlay" onclick="closeAddModalOnBg(event)">
  <div class="modal" id="addModal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeAddModal()">✕</button>
      <div class="modal-title">Add Production</div>
      <div class="modal-tabs">
        <button class="modal-tab active">New Production</button>
      </div>
    </div>
    <div class="modal-body">
      <form id="addProductionForm" style="padding:20px; display:flex; flex-direction:column; gap:14px; max-height:70vh; overflow-y:auto;">
        <div>
          <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Production Name *</label>
          <input type="text" id="apName" required style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;" />
        </div>
        <div>
          <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Project Name</label>
          <input type="text" id="apProject" style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;" />
        </div>
        <div style="display:flex;gap:12px;">
          <div style="flex:1;">
            <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Volume (m³)</label>
            <input type="number" step="0.01" id="apVolume" style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;" />
          </div>
          <div style="flex:1;">
            <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Mode of Discharge</label>
            <select id="apMode" style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;">
              <option value="">—</option>
              <option value="Manual">Manual</option>
              <option value="Pump">Pump</option>
              <option value="TBD">TBD</option>
            </select>
          </div>
        </div>
        <div>
          <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Time of Concrete at Site</label>
          <input type="text" id="apTime" placeholder="e.g. 8:00 AM or TBD" style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;" />
        </div>
        <div>
          <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Client Name</label>
          <input type="text" id="apClient" style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;" />
        </div>
        <div>
          <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Location</label>
          <input type="text" id="apLocation" style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;" />
        </div>
        <div>
          <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Date of Supply</label>
          <input type="date" id="apDate" style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;" />
        </div>
        <div>
          <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Cast Elements</label>
          <input type="text" id="apCast" style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;" />
        </div>
        <div style="display:flex;gap:12px;">
          <div style="flex:1;">
            <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Status</label>
            <select id="apStatus" style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;">
              <option value="Scheduled">Scheduled</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
              <option value="Cancelled">Cancelled</option>
            </select>
          </div>
          <div style="flex:1;">
            <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Class of Concrete</label>
            <input type="text" id="apClass" style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;" />
          </div>
        </div>
        <div style="display:flex;gap:12px;">
          <div style="flex:1;">
            <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Producing At</label>
            <select id="apProducingAt" style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;">
              <option value="">—</option>
              <option value="Tema">Tema</option>
              <option value="Teshie">Teshie</option>
            </select>
          </div>
          <div style="flex:1;">
            <label style="font-size:14px;font-weight:600;display:block;margin-bottom:6px;">Number of Trucks</label>
            <input type="number" min="1" max="10" id="apTrucks" style="width:100%;padding:9px 10px;border:1px solid #e0ddd8;border-radius:6px;font-size:16px;font-family:inherit;" />
          </div>
        </div>
        <div id="apError" style="color:#d9534f;font-size:14px;display:none;"></div>
        <button type="submit" id="apSubmitBtn" style="background:#f28324;color:#fff;border:none;padding:11px;border-radius:6px;font-size:16px;font-weight:600;cursor:pointer;">Create Production</button>
      </form>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const WORKER       = 'https://joalku-production-editer.dholmes127.workers.dev';
  const PROD_DB      = 'ec892733827e8384a0e10137c50c9d16';
  const DISPATCH_BASE = 'https://dholmes127.github.io/dispatch-board/?id=';
  const EDIT_BASE     = 'https://dholmes127.github.io/joalku-production-tool/joalku-schedule.html';

  // Users allowed to add/edit productions AND click dispatch buttons
  const CALENDAR_ADMIN_USERS = ['daniel_amegah', 'isaac_aidoo'];
  // Users allowed to click dispatch board buttons (separate list for when others are added)
  const DISPATCH_ADMIN_USERS = ['daniel_amegah', 'jude_agyeman_badu', 'isaac_aidoo'];
  // add 3 more here when their accounts are created:
  // 'username2', 'username3', 'username4'

  const urlParams = new URLSearchParams(window.location.search);
  const loginFromUrl = urlParams.get('login');
  const wpUser = loginFromUrl
    ? loginFromUrl.toLowerCase()
    : (typeof window.scbCurrentUser !== 'undefined' && window.scbCurrentUser?.login)
      ? window.scbCurrentUser.login.toLowerCase()
      : null;

  const canEditProduction = wpUser && CALENDAR_ADMIN_USERS.includes(wpUser);
  const canDispatch       = wpUser && DISPATCH_ADMIN_USERS.includes(wpUser);

  if (canEditProduction) document.getElementById('addBtn').classList.add('visible');

  let allProductions = [];
  let currentView = 'today';
  let currentDate = new Date();
  currentDate.setHours(0,0,0,0);

  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  window.onload = load;

  async function load() {
    try {
      const data = await queryDB([{property:'Date of Supply',direction:'ascending'}]);
      allProductions = data.results;
      render();
    } catch(e) {
      document.getElementById('calBody').innerHTML = `<div class="state-msg"><strong>Could not connect</strong>${e.message}</div>`;
    }
  }

  async function queryDB(sorts) {
    const body = { page_size: 100, sorts };
    const r = await fetch(`${WORKER}/v1/databases/${PROD_DB}/query`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message||'API error'); }
    return r.json();
  }

  function getProp(page, name, type='rich_text') {
    const p = page.properties[name];
    if (!p) return '—';
    if (type==='title')     return p.title?.[0]?.plain_text||'—';
    if (type==='rich_text') return p.rich_text?.[0]?.plain_text||'—';
    if (type==='date')      return p.date?.start||'—';
    if (type==='select')    return p.select?.name||'—';
    if (type==='number')    return p.number!=null ? p.number : '—';
    return '—';
  }

  function getDisplayName(p) {
    const project = getProp(p,'Project Name');
    if (project && project !== '—') return project;
    const client = getProp(p,'Client Name');
    if (client && client !== '—') return client;
    return getProp(p,'Production Name','title');
  }

  function getProdsForDate(dateStr) {
    const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
    let prods = allProductions.filter(p => getProp(p,'Date of Supply','date') === dateStr);
    if (q) {
      prods = prods.filter(p =>
        getDisplayName(p).toLowerCase().includes(q) ||
        getProp(p,'Client Name').toLowerCase().includes(q) ||
        getProp(p,'Production Name','title').toLowerCase().includes(q)
      );
    }
    return prods;
  }

  function onSearch() { render(); }
  function dateStr(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }

  function fmtDayLabel(d) {
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Tomorrow';
    return d.toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'long'});
  }

  function fmtShortDate(d) {
    return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  }

  function prodCard(p) {
    const id          = p.id;
    const name        = getDisplayName(p);
    const time        = getProp(p,'Time of Concrete at Site');
    const location    = getProp(p,'Location');
    const producingAt = getProp(p,'Producing At','select');
    const status      = getProp(p,'Status','select');
    const isTbd       = time==='TBD'||time==='—';

    // Time pill: shows status if In Progress/Completed/Cancelled, otherwise shows time/TBD
    let pillText, pillClass;
    if (status === 'In Progress') {
      pillText = 'In Progress'; pillClass = 'in-progress';
    } else if (status === 'Completed') {
      pillText = 'Completed'; pillClass = 'completed';
    } else if (status === 'Cancelled') {
      pillText = 'Cancelled'; pillClass = 'cancelled';
    } else {
      pillText = isTbd ? 'TBD' : time; pillClass = isTbd ? 'tbd' : 'set';
    }

    return `<div class="prod-card" onclick="openProduction('${id}')">
      <div class="prod-card-left">
        <div class="prod-card-name">${name}</div>
        <div class="prod-card-meta">
          ${producingAt!=='—'?`<span>🏭 ${producingAt}</span>`:''}
          ${location!=='—'?`<span>📍 ${location}</span>`:''}
        </div>
      </div>
      <div class="prod-time-badge ${pillClass}">${pillText}</div>
    </div>`;
  }

  function renderToday() {
    const today = new Date(); today.setHours(0,0,0,0);
    const ds = dateStr(today);
    const prods = getProdsForDate(ds);
    document.getElementById('navLabel').textContent = today.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
    const cal = document.getElementById('calBody');
    cal.innerHTML = prods.length
      ? prods.map(p => prodCard(p)).join('')
      : '<div class="state-msg"><strong>No productions today</strong></div>';
  }

  function renderUpcoming() {
    const cal = document.getElementById('calBody');
    cal.innerHTML = '';
    const today = new Date(); today.setHours(0,0,0,0);
    document.getElementById('navLabel').textContent = 'Next 7 days';

    for (let i = 0; i < 7; i++) {
      const d = new Date(today); d.setDate(today.getDate() + i);
      const ds = dateStr(d);
      const prods = getProdsForDate(ds);
      const isToday = i === 0;

      const group = document.createElement('div');
      group.className = 'day-group';
      const label = document.createElement('div');
      label.className = 'day-label' + (isToday?' today-label':'');
      label.innerHTML = isToday ? `<span class="today-dot"></span> TODAY — ${fmtShortDate(d)}` : fmtDayLabel(d).toUpperCase();
      group.appendChild(label);

      if (prods.length) {
        group.innerHTML += prods.map(p => prodCard(p)).join('');
      } else {
        group.innerHTML += `<div class="empty-day">No productions</div>`;
      }
      cal.appendChild(group);
    }
  }

  function renderSearchResults(q) {
    const cal = document.getElementById('calBody');
    const matches = allProductions.filter(p =>
      getProp(p,'Production Name','title').toLowerCase().includes(q) ||
      getProp(p,'Client Name').toLowerCase().includes(q)
    ).sort((a,b) => {
      const da = getProp(a,'Date of Supply','date');
      const db = getProp(b,'Date of Supply','date');
      return (db||'').localeCompare(da||'');
    });

    document.getElementById('navLabel').textContent = `Search results for "${q}"`;
    cal.innerHTML = '';

    if (!matches.length) {
      cal.innerHTML = '<div class="state-msg"><strong>No productions found</strong></div>';
      return;
    }

    const group = document.createElement('div');
    group.className = 'day-group';
    group.innerHTML = matches.map(p => {
      const d = getProp(p,'Date of Supply','date');
      const dateLabel = d !== '—' ? new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : 'No date';
      return `<div class="search-date-label" style="font-size:11px;color:#999;margin:10px 0 4px;">${dateLabel}</div>${prodCard(p)}`;
    }).join('');
    cal.appendChild(group);
  }

  function render() {
    const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
    if (q) { renderSearchResults(q); return; }
    if (currentView==='today') renderToday();
    else renderUpcoming();
  }

  function setView(v) {
    currentView = v;
    ['today','upcoming'].forEach(x => document.getElementById('vt-'+x).classList.toggle('active', x===v));
    currentDate = new Date(); currentDate.setHours(0,0,0,0);
    render();
  }

  function navigate(dir) {
    if (currentView==='today') {
      currentDate.setDate(currentDate.getDate()+dir);
      const cal = document.getElementById('calBody');
      const ds = dateStr(currentDate);
      const prods = getProdsForDate(ds);
      document.getElementById('navLabel').textContent = currentDate.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
      cal.innerHTML = prods.length
        ? prods.map(p => prodCard(p)).join('')
        : '<div class="state-msg"><strong>No productions</strong></div>';
    }
  }

  function goToday() {
    currentDate = new Date(); currentDate.setHours(0,0,0,0);
    render();
  }

  function openProduction(pageId) {
    const p = allProductions.find(x => x.id === pageId);
    if (!p) return;

    const name     = getProp(p,'Production Name','title');
    const client   = getProp(p,'Client Name');
    const time     = getProp(p,'Time of Concrete at Site');
    const location = getProp(p,'Location');
    const date     = getProp(p,'Date of Supply','date');

    document.getElementById('modalTitle').textContent = name;
    const metaParts = [];
    if (date!=='—') metaParts.push(new Date(date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'}));
    if (client!=='—') metaParts.push('👤 '+client);
    if (time!=='—') metaParts.push('🕐 '+time);
    if (location!=='—') metaParts.push('📍 '+location);
    document.getElementById('modalMeta').innerHTML = metaParts.map(m=>`<span>${m}</span>`).join('');

    // Pass both ?id= and ?login= to dispatch board so it can gate button clicks
    const cleanId = pageId.replace(/-/g,'');
    const dispatchUrl = `${DISPATCH_BASE}${cleanId}&login=${encodeURIComponent(wpUser || '')}`;
    document.getElementById('dispatchFrame').src = dispatchUrl;

    // Show/hide edit tab for admins
    const editTab = document.getElementById('mt-edit');
    if (canEditProduction) {
      editTab.classList.add('visible');
      document.getElementById('editFrame').src = `${EDIT_BASE}?id=${cleanId}`;
    } else {
      editTab.classList.remove('visible');
    }

    switchModalTab('dispatch');
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('dispatchFrame').src = 'about:blank';
    document.getElementById('editFrame').src = 'about:blank';
    document.body.style.overflow = '';
  }

  function closeModalOnBg(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

  function switchModalTab(tab) {
    ['dispatch','edit'].forEach(t => {
      document.getElementById('mt-'+t)?.classList.toggle('active', t===tab);
      document.getElementById('mc-'+t)?.classList.toggle('active', t===tab);
    });
  }

  function openAddModal() {
    if (!canEditProduction) return;
    document.getElementById('addProductionForm').reset();
    document.getElementById('apError').style.display = 'none';
    document.getElementById('addModalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeAddModal() {
    document.getElementById('addModalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function closeAddModalOnBg(e) { if (e.target === document.getElementById('addModalOverlay')) closeAddModal(); }

  document.getElementById('addProductionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!canEditProduction) return;

    const errEl = document.getElementById('apError');
    errEl.style.display = 'none';

    const name = document.getElementById('apName').value.trim();
    const client = document.getElementById('apClient').value.trim();

    if (!client) {
      errEl.textContent = 'Client Name is required.';
      errEl.style.display = 'block';
      return;
    }

    // Page title in Notion = Client Name; Project Name used for display fallback on calendar
    const properties = {
      'Production Name': { title: [{ text: { content: client } }] }
    };
    const project = document.getElementById('apProject').value.trim();
    if (project) properties['Project Name'] = { rich_text: [{ text: { content: project } }] };
    const volume = document.getElementById('apVolume').value;
    if (volume !== '') properties['Volume (m³)'] = { number: Number(volume) };
    const mode = document.getElementById('apMode').value;
    if (mode) properties['Mode of Discharge'] = { select: { name: mode } };
    const timeVal = document.getElementById('apTime').value.trim();
    if (timeVal) properties['Time of Concrete at Site'] = { rich_text: [{ text: { content: timeVal } }] };
    if (client) properties['Client Name'] = { rich_text: [{ text: { content: client } }] };
    const location = document.getElementById('apLocation').value.trim();
    if (location) properties['Location'] = { rich_text: [{ text: { content: location } }] };
    const dateVal = document.getElementById('apDate').value;
    if (dateVal) properties['Date of Supply'] = { date: { start: dateVal } };
    const cast = document.getElementById('apCast').value.trim();
    if (cast) properties['Cast Elements'] = { rich_text: [{ text: { content: cast } }] };
    const classOf = document.getElementById('apClass').value.trim();
    if (classOf) properties['Class of Concrete'] = { rich_text: [{ text: { content: classOf } }] };
    const producingAt = document.getElementById('apProducingAt').value;
    if (producingAt) properties['Producing At'] = { select: { name: producingAt } };
    const trucks = document.getElementById('apTrucks').value;
    if (trucks !== '') properties['Number of Trucks'] = { number: Number(trucks) };

    properties['Status'] = { select: { name: document.getElementById('apStatus').value } };

    const btn = document.getElementById('apSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'Creating…';

    try {
      const r = await fetch(`${WORKER}/v1/pages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ parent: { database_id: PROD_DB }, properties })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.message || 'Failed to create production');
      closeAddModal();
      toast('Production created');
      await load();
    } catch (err) {
      errEl.textContent = 'Could not create production: ' + err.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Production';
    }
  });

  function toast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent=msg; t.className='toast show '+type;
    setTimeout(()=>t.className='toast',3000);
  }
</script>
</body>
</html>
